apiVersion: v1
kind: ConfigMap
metadata:
  name: codesys-runtime-config
  namespace: codesys-x86
  labels:
    app: codesys-runtime
    architecture: x86
data:
  # CODESYS runtime configuration
  CODESYSControl.cfg: |
    [SysProcess]
    Command.0=locale
    Command.1=ifconfig
    
    [CmpSettings]
    MaxFileSize=10000000
    
    [SysFile]
    PlcLogicPrefix=1
    
    [CmpLog]
    Logger.0.Name=StdOut
    Logger.0.Filter=0x0000000F
    Logger.0.Enable=1
    Logger.0.MaxEntries=1000
    Logger.0.Type=0x314
    
    [CmpApp]
    Application.1=Application
    
    [Application]
    ProjectFile=/var/opt/codesys/projects/Application.app
    BootprojectAutostart=YES
    
    [SysCom]
    Linux.Devicefile=/dev/null
    
    [CmpBlkDrvTcp]
    TcpPort=11740
    MaxChannels=10
    
    [CmpWebServer]
    WebServerPort=2455
    MaxConnections=10
    DefaultPage=webvisu.htm
    
    [CmpOPCUAServer]
    ServerPort=4840
    Enabled=1
    
    [SysSocket]
    Adapter.0.Name=eth0
    Adapter.0.EnableSetIpAndMask=0
    
  runtime.env: |
    # Runtime environment variables
    CODESYS_LOG_LEVEL=INFO
    CODESYS_MAX_APPLICATIONS=4
    CODESYS_CYCLE_TIME_MS=10
