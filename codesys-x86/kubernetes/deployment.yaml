apiVersion: apps/v1
kind: Deployment
metadata:
  name: codesys-runtime-amd64
  namespace: codesys-x86
  labels:
    app: codesys-runtime
    architecture: amd64
spec:
  replicas: 1
  strategy:
    type: Recreate  # Ensure only one instance runs at a time
  selector:
    matchLabels:
      app: codesys-runtime
      architecture: amd64
  template:
    metadata:
      labels:
        app: codesys-runtime
        architecture: amd64
    spec:
      # Node selector for amd64 architecture
      nodeSelector:
        kubernetes.io/arch: amd64
      
      # Security context
      securityContext:
        fsGroup: 1000
      
      # Init container to set up permissions
      initContainers:
        - name: setup-permissions
          image: busybox:latest
          command: ['sh', '-c', 'chmod -R 755 /var/opt/codesys/projects && chmod -R 755 /var/opt/codesys/license']
          volumeMounts:
            - name: codesys-projects
              mountPath: /var/opt/codesys/projects
            - name: codesys-license
              mountPath: /var/opt/codesys/license
      
      containers:
        - name: codesys-runtime
          image: ghcr.io/YOUR_ORG/codesys-control-x86:latest
          imagePullPolicy: Always
          
          # Security context for container
          securityContext:
            capabilities:
              add:
                - SYS_NICE      # Required for real-time scheduling
                - NET_RAW       # Required for raw network access
                - NET_ADMIN     # Required for network configuration
                - SYS_TIME      # Required for time synchronization
            # Run as non-root user
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          
          # Resource limits and requests
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          
          # Ports
          ports:
            - name: plc-comm
              containerPort: 11740
              protocol: TCP
            - name: webvisu
              containerPort: 2455
              protocol: TCP
            - name: opcua
              containerPort: 4840
              protocol: TCP
          
          # Environment variables
          env:
            - name: CODESYS_ARCHITECTURE
              value: "amd64"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          
          # Volume mounts
          volumeMounts:
            - name: codesys-projects
              mountPath: /var/opt/codesys/projects
            - name: codesys-license
              mountPath: /var/opt/codesys/license
            - name: runtime-config
              mountPath: /opt/codesys/config
          
          # Liveness probe
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pidof codesyscontrol
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          # Readiness probe
          readinessProbe:
            tcpSocket:
              port: 11740
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Startup probe
          startupProbe:
            tcpSocket:
              port: 11740
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
      
      # Volumes
      volumes:
        - name: codesys-projects
          persistentVolumeClaim:
            claimName: codesys-projects-pvc
        - name: codesys-license
          persistentVolumeClaim:
            claimName: codesys-license-pvc
        - name: runtime-config
          configMap:
            name: codesys-runtime-config
      
      # DNS policy
      dnsPolicy: ClusterFirst
      
      # Restart policy
      restartPolicy: Always

---
