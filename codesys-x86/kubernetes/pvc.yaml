apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codesys-projects-pvc
  namespace: codesys-x86
  labels:
    app: codesys-runtime
    architecture: x86
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Uncomment and modify if using a specific storage class
  # storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codesys-license-pvc
  namespace: codesys-x86
  labels:
    app: codesys-runtime
    architecture: x86
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  # Uncomment and modify if using a specific storage class
  # storageClassName: local-path
