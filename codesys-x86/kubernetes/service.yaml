apiVersion: v1
kind: Service
metadata:
  name: codesys-runtime-service
  namespace: codesys-x86
  labels:
    app: codesys-runtime
    architecture: x86
spec:
  type: NodePort
  selector:
    app: codesys-runtime
  ports:
    # CODESYS PLC communication port
    - name: plc-comm
      port: 11740
      targetPort: 11740
      protocol: TCP
      nodePort: 31740  # External access port (modify as needed)
    
    # Web visualization port
    - name: webvisu
      port: 2455
      targetPort: 2455
      protocol: TCP
      nodePort: 32455  # External access port (modify as needed)
    
    # OPC UA port (optional)
    - name: opcua
      port: 4840
      targetPort: 4840
      protocol: TCP
      nodePort: 34840  # External access port (modify as needed)
---
# Headless service for StatefulSet scenarios (if needed)
apiVersion: v1
kind: Service
metadata:
  name: codesys-runtime-headless
  namespace: codesys-x86
  labels:
    app: codesys-runtime
    architecture: x86
spec:
  clusterIP: None
  selector:
    app: codesys-runtime
  ports:
    - name: plc-comm
      port: 11740
      targetPort: 11740
      protocol: TCP
